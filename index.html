<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARPASIT | Advanced Research Project Agency For Science And Information Technology</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon">
</head>
<body>
    <header>
        <div class="header">
            <h1>ARPASIT</h1>
            <br><br>
            <div class="menu-btn" id="menuBtn">☰</div>
            <nav class="nav" id="navMenu">
                <a href="./">Home</a>
                <a href="./about-us/">About Us</a>
                <a href="./contact-us/">Contact Us</a>
            </nav>
        </div>
        <br>
        <p class="logo">
            -Advanced Research Project Agency For Science And Information Technology-
        </p>
    </header>

    <main class="research-portal">
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search NASA Research Archives...">
                <button id="searchBtn">Start Research</button>
            </div>

            <div class="category-filters">
                <button class="filter-btn" onclick="quickSearch('Mars')">Mars Exploration</button>
                <button class="filter-btn" onclick="quickSearch('Earth')">Earth Science</button>
                <button class="filter-btn" onclick="quickSearch('Technology')">NASA Tech</button>
                <button class="filter-btn" onclick="quickSearch('Apollo')">History/Apollo</button>
                <button class="filter-btn" onclick="quickSearch('Black Hole')">Deep Space</button>
            </div>
        </div>
        
        <div id="resultsGrid" class="results-grid">
            <p class="status-msg">Select a category or enter a topic to begin data retrieval.</p>
        </div>
    </main>

    <footer>
        &copy;Copyright, Meisophant Digital Services, 2026
    </footer>

    <script src="./assets/js/script.js"></script> 
    <script src="./assets/js/research-engine.js"></script>
</body>
</html>
