<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARPASIT | Advanced Research Project Agency For Science And Information Technology</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon">
</head>
<body>
    <header>
        <div class="header">
            <h1>ARPASIT</h1>
            <div class="menu-btn" id="menuBtn">☰</div>
            <nav class="nav" id="navMenu">
                <a href="./">Home</a>
                <a href="./about-us/">About Us</a>
                <a href="./contact-us/">Contact Us</a>
            </nav>
        </div>
        <p class="logo">-Advanced Research Project Agency For Science And Information Technology-</p>
    </header>

    <main class="research-section">
        <div class="search-container">
            <div class="agency-controls">
                <select id="nasaDept">
                    <option value="images">General Science Library</option>
                    <option value="mars">Mars Rover Expedition</option>
                    <option value="asteroids">Planetary Defense (NeoWs)</option>
                </select>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search for research topics...">
                    <button id="searchBtn">Initialize Research</button>
                </div>
            </div>
        </div>

        <!-- Result Output Area -->
        <div id="resultsGrid" class="results-grid">
            <div class="status-msg">Awaiting research parameters...</div>
        </div>
    </main>

    <footer>
        &copy;Copyright, Meisophant Digital Services, 2026
    </footer>

    <!-- New Modular Scripts -->
    <script src="./assets/js/nasa-logic.js"></script>
    <script src="./assets/js/script.js"></script>
</body>
</html>
